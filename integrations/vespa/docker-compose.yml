services:
  vespa:
    image: vespaengine/vespa:8.687.75
    container_name: vespa
    hostname: vespa
    ports:
      - "8080:8080"
      - "19071:19071"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19071/ApplicationStatus"]
      interval: 10s
      timeout: 5s
      retries: 30
