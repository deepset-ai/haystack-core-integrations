# This workflow comes from https://github.com/ofek/hatch-mypyc
# https://github.com/ofek/hatch-mypyc/blob/5a198c0ba8660494d02716cfc9d79ce4adfb1442/.github/workflows/test.yml
name: Test / microsoft_sharepoint

on:
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    paths:
      - "integrations/microsoft_sharepoint/**"
      - "!integrations/microsoft_sharepoint/*.md"
      - ".github/workflows/microsoft_sharepoint.yml"
  push:
    branches:
      - main
    paths:
      - "integrations/microsoft_sharepoint/**"
      - "!integrations/microsoft_sharepoint/*.md"
      - ".github/workflows/microsoft_sharepoint.yml"

defaults:
  run:
    working-directory: integrations/microsoft_sharepoint

concurrency:
  group: microsoft-sharepoint-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  TEST_MATRIX_OS: '["ubuntu-latest", "windows-latest", "macos-latest"]'
  TEST_MATRIX_PYTHON: '["3.10", "3.14"]'

jobs:
  compute-test-matrix:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: .
    outputs:
      os: ${{ steps.set.outputs.os }}
      python-version: ${{ steps.set.outputs.python-version }}
    steps:
      - id: set
        run: |
          echo 'os=${{ github.event_name == 'push' && '["ubuntu-latest"]' || env.TEST_MATRIX_OS }}' >> "$GITHUB_OUTPUT"
          echo 'python-version=${{ github.event_name == 'push' && '["3.10"]' || env.TEST_MATRIX_PYTHON }}' >> "$GITHUB_OUTPUT"

  run:
    name: Python ${{ matrix.python-version }} on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
    needs: compute-test-matrix
    permissions:
      contents: write
      pull-requests: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.compute-test-matrix.outputs.os) }}
        python-version: ${{ fromJSON(needs.compute-test-matrix.outputs.python-version) }}

    # Live integration tests hit Microsoft Graph with a delegated user token, which is minted at
    # runtime from a long-lived refresh token. See the "Running the integration tests" section of
    # integrations/microsoft_sharepoint/README.md for the secrets/variables below and how to obtain
    # them. `HAS_MS_GRAPH_SECRETS` is derived as a boolean string without exposing the secret values,
    # so the token-minting step can gate on it (a step's own `env:` is not visible to its `if:`, and
    # secrets cannot be referenced in `if:` directly).
    env:
      HAS_MS_GRAPH_SECRETS: ${{ secrets.MS_GRAPH_TENANT_ID != '' && secrets.MS_GRAPH_CLIENT_ID != '' && secrets.MS_GRAPH_CLIENT_SECRET != '' && secrets.MS_GRAPH_REFRESH_TOKEN != '' }}

    steps:
      - name: Support longpaths
        if: matrix.os == 'windows-latest'
        working-directory: .
        run: git config --system core.longpaths true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch --uploaded-prior-to=P1D
      - name: Lint
        if: matrix.python-version == '3.10' && runner.os == 'Linux'
        run: hatch run fmt-check && hatch run test:types

      - name: Run unit tests
        run: hatch run test:unit-cov-retry

      # On PR: posts coverage comment (directly on same-repo PRs; via artifact for fork PRs). On push to main: stores coverage baseline on data branch.
      - name: Store unit tests coverage
        id: coverage_comment
        if: matrix.python-version == '3.10' && runner.os == 'Linux' && github.event_name != 'schedule'
        uses: py-cov-action/python-coverage-comment-action@5d8df5979747514c914e1c5a12335a7cf9a2745f # v4.1
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: integrations/microsoft_sharepoint
          SUBPROJECT_ID: microsoft_sharepoint
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 60

      - name: Upload coverage comment to be posted
        if: matrix.python-version == '3.10' && runner.os == 'Linux' && github.event_name == 'pull_request' && steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-comment-microsoft_sharepoint
          path: python-coverage-comment-action-microsoft_sharepoint.txt

      # Exchanges the stored refresh token for a short-lived delegated Microsoft Graph access token and
      # exposes it to later steps as MS_SHAREPOINT_ACCESS_TOKEN. Skipped when the secrets are absent
      # (e.g. on fork PRs), in which case the live integration tests skip themselves.
      #
      # TEMPORARILY DISABLED (2026-06)
      - name: Mint Microsoft Graph access token
        if: false && env.HAS_MS_GRAPH_SECRETS == 'true'
        shell: bash
        env:
          MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_REFRESH_TOKEN: ${{ secrets.MS_GRAPH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          response="$(curl -sS -X POST \
            "https://login.microsoftonline.com/${MS_GRAPH_TENANT_ID}/oauth2/v2.0/token" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "client_id=${MS_GRAPH_CLIENT_ID}" \
            --data-urlencode "client_secret=${MS_GRAPH_CLIENT_SECRET}" \
            --data-urlencode 'grant_type=refresh_token' \
            --data-urlencode "refresh_token=${MS_GRAPH_REFRESH_TOKEN}" \
            --data-urlencode 'scope=https://graph.microsoft.com/.default offline_access')"
          if ! access_token="$(printf '%s' "$response" | jq -er '.access_token')"; then
            echo 'Failed to mint a Microsoft Graph access token from the refresh token.' >&2
            printf '%s' "$response" | jq -r '"error: \(.error // "?") - \(.error_description // "?")"' >&2 || true
            exit 1
          fi
          echo "::add-mask::${access_token}"
          echo "MS_SHAREPOINT_ACCESS_TOKEN=${access_token}" >> "$GITHUB_ENV"
          echo 'Minted a Microsoft Graph access token (value masked).'

      # TEMPORARILY DISABLED (2026-06)
      - name: Run integration tests
        if: false && env.HAS_MS_GRAPH_SECRETS == 'true'
        env:
          MS_SHAREPOINT_TEST_FILE_URL: ${{ secrets.MS_SHAREPOINT_TEST_FILE_URL }}
        run: hatch run test:integration-cov-append-retry

      - name: Store combined coverage
        if: github.event_name == 'push'
        uses: py-cov-action/python-coverage-comment-action@5d8df5979747514c914e1c5a12335a7cf9a2745f # v4.1
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: integrations/microsoft_sharepoint
          SUBPROJECT_ID: microsoft_sharepoint-combined
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 60

      - name: Run unit tests with lowest direct dependencies
        if: github.event_name != 'push'
        run: |
          hatch run uv pip compile pyproject.toml --resolution lowest-direct --output-file requirements_lowest_direct.txt
          hatch -e test env run -- uv pip install -r requirements_lowest_direct.txt
          hatch run test:unit

      - name: Nightly - run unit tests with Haystack main branch
        if: github.event_name == 'schedule'
        run: |
          hatch env prune
          hatch -e test env run -- uv pip install git+https://github.com/deepset-ai/haystack.git@main
          hatch run test:unit

  notify-slack-on-failure:
    needs: run
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-slim
    steps:
      - uses: deepset-ai/notify-slack-action@a65def0c8bf91d6520286ab34280151c76a5a008 # v1.1.0
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_NOTIFICATIONS }}
